on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/gradle /var/lib/apt/lists/*
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison gawk gettext git libncurses-dev libssl-dev rsync unzip zlib1g-dev file wget gzip curl jq

      - name: Clone OpenWrt 25.12 stable & sync latest code
        run: |
          git clone -b openwrt-25.12 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git pull origin openwrt-25.12
          # === 增加部分：添加 PassWall 2 的软件源依赖 ===
          echo "src-git passwall_packages https://github.com" >> feeds.conf.default
          echo "src-git passwall_app https://github.com" >> feeds.conf.default
          # ============================================
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add OpenClash package source
        run: |
          cd openwrt/package
          rm -rf luci-app-openclash
          git clone https://github.com/vernesong/OpenClash.git luci-app-openclash

      - name: Load custom config & auto download latest mihomo core
        run: |
          cd openwrt
          echo "CONFIG_TARGET_ramips=y" > .config
          echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621_DEVICE_hiwifi_hc5962=y" >> .config
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_kmod-tun=y" >> .config
          echo "CONFIG_PACKAGE_ca-bundle=y" >> .config
          echo "CONFIG_PACKAGE_libopenssl=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-openclash=y" >> .config
          # === 增加部分：添加 PassWall 2 编译配置及语言包 ===
          echo "CONFIG_PACKAGE_luci-app-passwall=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y" >> .config
          # ============================================

          mkdir -p package/base-files/files/etc/openclash/core/
          LATEST_MIHOMO=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r .tag_name)
          wget "https://github.com/MetaCubeX/mihomo/releases/download/${LATEST_MIHOMO}/mihomo-linux-mipsle-softfloat-${LATEST_MIHOMO}.gz" \
          -O package/base-files/files/etc/openclash/core/clash_meta.gz         
          gunzip package/base-files/files/etc/openclash/core/clash_meta.gz
          chmod +x package/base-files/files/etc/openclash/core/clash_meta

          # === 增加部分：自动下载并集成 Zashboard 面板 v3.14.0 ===
          mkdir -p package/base-files/files/etc/openclash/ui/zashboard/
          wget "https://github.com" -O zashboard.tar.gz
          tar -zxf zashboard.tar.gz -C package/base-files/files/etc/openclash/ui/
          mv package/base-files/files/etc/openclash/ui/dist package/base-files/files/etc/openclash/ui/zashboard/dist
          rm -f zashboard.tar.gz
          # ====================================================

      - name: Compile the firmware
        run: |
          cd openwrt
          make defconfig
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt25.12_HiWiFi_HC5962
          path: openwrt/bin/targets/ramips/mt7621/*sysupgrade.bin
